<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sponsored Transactions Demo</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header>
      <h1>Sponsored Transactions Demo</h1>
      <p id="connection-status" class="status disconnected">Connecting...</p>
    </header>

    <main>
      <section id="sponsor-panel" class="panel">
        <h2>Sponsor Setup (Alice)</h2>
        <div class="state-display">
          <div class="state-row">
            <span class="label">Status:</span>
            <span id="sponsor-status">Not registered</span>
          </div>
          <div class="state-row">
            <span class="label">Budget on hold:</span>
            <span id="budget-on-hold">-</span>
          </div>
          <div class="state-row">
            <span class="label">Pending on hold:</span>
            <span id="pending-on-hold">-</span>
          </div>
          <div class="state-row">
            <span class="label">Alice free balance:</span>
            <span id="alice-balance">-</span>
          </div>
          <div class="state-row">
            <span class="label">Allowed callers:</span>
            <span id="allowed-callers">-</span>
          </div>
        </div>
        <div class="actions">
          <button id="btn-register">Register Alice as Sponsor</button>
          <button id="btn-increase" disabled>Increase Budget (+0.5)</button>
          <button id="btn-decrease" disabled>Decrease Budget (-0.2)</button>
          <button id="btn-pause" disabled>Pause</button>
          <button id="btn-resume" disabled>Resume</button>
          <button id="btn-unregister" disabled>Unregister</button>
        </div>
      </section>

      <section id="tx-panel" class="panel">
        <h2>Sponsored Transaction (Bob)</h2>
        <div class="state-display">
          <div class="state-row">
            <span class="label">Bob free balance:</span>
            <span id="bob-balance">-</span>
          </div>
        </div>
        <div class="form-row">
          <label for="remark-input">Remark message:</label>
          <input id="remark-input" type="text" value="Hello from sponsored tx!" />
        </div>
        <div class="actions">
          <button id="btn-sponsored-remark" disabled>
            Submit Sponsored Remark (Alice pays)
          </button>
        </div>
      </section>

      <section id="log-panel" class="panel">
        <h2>Event Log</h2>
        <div id="event-log"></div>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
